<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .contenedor {
            display: grid;
            grid-template-areas:
                "header header"
                "contenido sidebar"
                "footer footer";
            
                grid-template-columns: 1fr 200px ;
                grid-template-rows: 80px 1fr 60px;
                height: 100vh;
  
      }

        .header {
            grid-area: header;
            background-color: #2980b9;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sidebar {
            grid-area: sidebar;
            background-color: #44495e;
            color: white;
            padding: 20px;
        }

        .contenido {
            grid-area: contenido;
            background-color: #00f888;
            padding: 20px;
        }

        .footer {
            grid-area: footer;
            background-color: #f7003a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

    </style>
</head>
<body>
    <div class="contenedor">
        <div class="header">Encabezado</div>
        <div class="sidebar">Menú Lateral</div>
        <div class="contenido">Contenido principal</div>
        <div class="footer">Pie de la página</div>
    </div>
</body>
</html>
