<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIV Y SPAN</title>
    <style>
        h2{
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color: #e7e7e7;

        }

        .calculo{
            font-family: 'Courier New', Courier, monospace;
            background-color: rgb(201,201,201);
            max-width: 150px;
        }

         span{
            color: #f00;
            font-weight: bolder;
         }
        
    </style>
</head>
<body>
    <h2>Operaciones matemáticas</h2>
    <p>Las matemáticas son importantes</p>
    <p>Nos permiten hacer cálculos </p>
    <div class="calculo">
    <p> 5 + 8 = <span>13</span> </p> 
    <p> 10 - 6 = <span>4</span></p>
    <p> 3 x 10 = <span>30</span></p>
</div>
<p>Existen muchas operaciones distintas</p>
<p>Pronto veremos como manejarlas</p>


</body>
</html>
