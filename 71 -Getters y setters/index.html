<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class Deportista{
        #nombre;
        #apellido;
        constructor(nombre, apellido){
            this.nombre = nombre;
            this.apellido = apellido;
        }
    }

    class Futbolista extends Deportista{
        #goles;
        constructor(nombre, apellido, goles){
            super(nombre, apellido);
            this.goles = goles;
        }

        get getGoles(){
            return this._goles;
        }

        set setGoles(nuevosGoles){
            this._goles = nuevosGoles;
        }
    }


    let cristiano = new Futbolista("Cristiano", "Ronaldo", 900);
    </script>
</body>
</html>
