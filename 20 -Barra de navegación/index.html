<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .menu{
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2c3e50;
            padding: 10px 20px;

        }

        .logo {
            color: #ecf0f1;
            font-size: 30px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: #ecf0f1;
            text-decoration: none;            /*Para que no se vea que son enlaces   */
            padding: 5px 10px;                 /*Espacio entre opciones   */
            transition: background 0.3s;
        }

        .nav-links a:hover {
            background: #34495e;
            border-radius: 4px;

        }
    </style>
</head>
<body>
    <div class="menu">
        <div class="logo">🎮 Juegos</div>
        <div class="nav-links">
        <a href="#">Inicio</a>
        <a href="#">Servicios</a>
        <a href="#">Acerca de</a>
        <a href="#">Contacto</a>
        </div>
    </div>
</body>
</html>
